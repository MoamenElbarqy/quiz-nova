services:
  db:
    image: postgres:18.3
    container_name: quiznova-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
  api:
    build:
      context: .
      dockerfile: src/QuizNova.Api/Dockerfile
    container_name: quiznova-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=QuizNova;Username=admin;Password=Moamen@SQL123
      JwtSettings__Issuer: ${JWT_ISSUER:-QuizNova.Api}
      JwtSettings__Audience: ${JWT_AUDIENCE:-QuizNova.Client}
      JwtSettings__Secret: ${JWT_SECRET:-QuizNova-Development-Secret-Key-Change-This-2026}
      JwtSettings__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-7}
    ports:
      - "${API_PORT:-7100}:8080"
    networks:
      - frontend
      - backend

  client:
    build:
      context: ./src/QuizNova.Client
      dockerfile: Dockerfile.dev

    container_name: quiznova-client

    volumes:
      - ./src/QuizNova.Client:/app
      - /app/node_modules

    restart: unless-stopped

    depends_on:
      api:
        condition: service_started

    environment:
      NODE_ENV: Development

    ports:
      - "${CLIENT_PORT:-4200}:4000"

    networks:
      - frontend

volumes:
  postgres_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
