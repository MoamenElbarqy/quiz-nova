<section class="auth-page">
  <div class="auth-content">
    <app-logo class="auth-logo"></app-logo>
    <div class="auth-copy">
      <h1>Sign in</h1>
      <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
    </div>
    <form (submit)="onSubmit()" class="auth-form">
      <div class="auth-field">
        <label for=""> Email</label>
        <input type="email" [formField]="loginForm.email" />
      </div>
      <div class="auth-field">
        <label for=""> password</label>
        <input type="password" [formField]="loginForm.password" />
      </div>
      <div class="roles">
        @for (role of userRoles(); track role.id) {
          <label class="role-box">
            <input type="radio" [formField]="loginForm.role" [value]="role.value" />
            <span>{{ role.lable }}</span>
          </label>
        }
      </div>
      <button type="button" class="btn-primary">Sign in</button>
    </form>
  </div>
</section>
