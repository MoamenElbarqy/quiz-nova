<app-auth
  leftTitle="Welcome back"
  leftDescription="Access your dashboard, manage quizzes, and track student performance — all in one place."
  heading="Sign in"
  promptText="Don't have an account?"
  promptLinkLabel="Sign up"
  promptLink="/register"
>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
    <div class="auth-field">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" formControlName="email" />
    </div>
    <div class="auth-field">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" formControlName="password" />
    </div>
    <div class="roles">
      @for (role of userRoles; track role.id) {
      <label class="role-box">
        <input type="radio" formControlName="role" [value]="role.value" />
        <span>{{ role.label }}</span>
      </label>
      }
    </div>
    <button type="submit" class="auth-button">Sign in</button>
    @if (errorMessage()) {
    <p class="auth-error">{{ errorMessage() }}</p>
    }
  </form>
</app-auth>
