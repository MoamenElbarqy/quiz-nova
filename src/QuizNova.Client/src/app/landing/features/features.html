<section id="features" class="features">
  <div class="container">
    <article class="section-heading">
      <h2 class="fade-in">
        Everything you need to
        <span class="gradient-text">assess brilliance</span>
      </h2>
      <p class="fade-in">
        A complete platform for creating, managing, and analyzing educational
        assessments at scale.
      </p>
    </article>
    <div class="cards">
      @for (feature of sortedCards(); track feature.id; let i = $index) {
      <app-feature-card class="fade-in" style="--element-index: {{ i }}">
        <i [class]="feature.icon"></i>
        <h3 class="card-title">{{ feature.title }}</h3>
        <p class="card-content">{{ feature.content }}</p>
      </app-feature-card>
      }
    </div>
  </div>
</section>
